<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Monitor de Rodaje — Costa Verde</title>
<style>
:root{
  --v:#2ECC40;--n:#FF6B1A;--k:#0a0a0a;--gd:#1a1a1a;
  --gm:#2a2a2a;--gl:#3a3a3a;--w:#fff;--ws:#e8e8e8;--ts:#888;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--k);color:var(--w);min-height:100vh}

.hdr{background:var(--k);border-bottom:2px solid var(--v);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px}
.logo{height:32px;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700;color:var(--v);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdate{font-size:10px;color:var(--ts)}
.btn-menu{background:var(--gd);border:1px solid var(--gl);color:var(--ws);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}

.sbar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--gm)}
.si{padding:7px 6px;text-align:center;border-right:1px solid var(--gm)}
.si:last-child{border-right:none}
.sv{font-size:17px;font-weight:700}
.sl{font-size:10px;color:var(--ts)}
.pb{height:3px;background:var(--gm)}
.pf{height:100%;background:var(--v);transition:width .4s}

.tabs{display:flex;background:var(--gd);border-bottom:1px solid var(--gm)}
.tab{flex:1;padding:11px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--ts);border-bottom:2px solid transparent;user-select:none}
.tab.on{color:var(--v);border-bottom-color:var(--v)}
.view{display:none;padding:12px 12px 48px}
.view.on{display:block}

/* BLOQUES */
.blq{margin-bottom:10px;border-radius:10px;border:1px solid var(--gm);overflow:hidden}
.bhdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;background:var(--gd)}
.bhdr:active{filter:brightness(1.2)}
.bdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bi{flex:1;min-width:0}
.bn{font-size:13px;font-weight:600;color:var(--w);line-height:1.3}
.bm{font-size:11px;color:var(--ts);margin-top:2px}
.bct{font-size:12px;font-weight:600;color:var(--ts);white-space:nowrap;flex-shrink:0}
.bch{font-size:18px;color:var(--ts);transition:transform .2s;flex-shrink:0;line-height:1}
.bch.op{transform:rotate(180deg)}
.bnota{font-size:11px;color:var(--n);padding:6px 12px;background:rgba(255,107,26,.08);border-top:1px solid rgba(255,107,26,.15)}
.twrap{display:none;background:#fff}

/* TIROS — tabla */
.tiros-hdr{display:grid;grid-template-columns:32px 100px 50px 1fr 90px 110px 54px;gap:0;padding:6px 10px;background:#f0f0f0;border-top:1px solid #ddd}
.tiros-hdr span{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em}
.tr{display:grid;grid-template-columns:32px 100px 50px 1fr 90px 110px 54px;gap:0;padding:8px 10px;border-top:1px solid #eee;cursor:pointer;align-items:start;background:#fff;position:relative}
.tr:hover{background:#fafafa}
.tck{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .15s;background:#fff;margin-top:2px}
.tck.ok{background:var(--v);border-color:var(--v);color:#000;font-weight:700}
.tck.sk{background:#dc2626;border-color:#dc2626;color:#fff}
.tid{font-size:11px;font-weight:700;color:#222;padding-top:2px}
.ep{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;margin-right:3px}
.e1{background:#dbeafe;color:#1e40af}
.e2{background:#dcfce7;color:#166534}
.e3{background:#ede9fe;color:#4c1d95}
.tds{font-size:12px;color:#222;line-height:1.4}
.tds.dn{text-decoration:line-through;color:#aaa}
.tds[contenteditable="true"]{outline:2px solid var(--v);border-radius:4px;padding:2px 4px;background:#f0fff4;cursor:text}
.tmt{font-size:11px;color:#666;padding-top:2px;line-height:1.4}
.tdr{font-size:11px;color:#888;text-align:right;padding-top:2px}
.edit-btn{position:absolute;right:8px;top:8px;background:none;border:none;font-size:13px;cursor:pointer;color:#bbb;opacity:0;transition:opacity .15s;padding:2px 4px}
.tr:hover .edit-btn{opacity:1}

/* GUION */
.epb{margin-bottom:20px}
.ept{font-size:15px;font-weight:700;color:var(--v);padding-bottom:6px;border-bottom:1px solid var(--gm);margin-bottom:4px}
.eps{font-size:12px;color:var(--ts);margin-bottom:12px;line-height:1.6;font-style:italic}
.esc{margin-bottom:12px;border-radius:8px;border:1px solid var(--gm);overflow:hidden}
.esh{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--gd)}
.esn{font-size:11px;font-weight:700;color:var(--n);white-space:nowrap}
.est{font-size:13px;font-weight:600;color:var(--w);flex:1;line-height:1.3}
.esd{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--gl)}
.esd.ok{background:var(--v)}.esd.pt{background:var(--n)}
.esb{padding:10px 12px;background:#fff;position:relative}
.esa{font-size:12px;color:#222;line-height:1.7;margin-bottom:8px;white-space:pre-wrap}
.esa[contenteditable="true"]{outline:2px solid var(--v);border-radius:4px;padding:4px 6px;background:#f0fff4;cursor:text}
.esdl{font-size:12px;color:#555;line-height:1.7;font-style:italic;border-left:3px solid var(--n);padding-left:10px;white-space:pre-wrap;margin-bottom:8px}
.esdl[contenteditable="true"]{outline:2px solid var(--n);border-radius:4px;padding:4px 8px;background:#fff8f5;cursor:text}
.estp{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid #ddd;color:#666;background:#f5f5f5}
.pill.ok{background:rgba(46,204,64,.12);border-color:var(--v);color:#1a7a25}
.pill.sk{background:rgba(220,38,38,.12);border-color:#dc2626;color:#dc2626}
.esc-edit-btn{background:none;border:none;font-size:12px;cursor:pointer;color:#bbb;padding:2px 6px;border-radius:4px;flex-shrink:0}
.esc-edit-btn:hover{color:var(--v);background:rgba(46,204,64,.1)}
.esc-edit-btn.active{color:var(--v)}
.edit-hint{font-size:10px;color:var(--ts);margin-top:6px;font-style:italic;display:none}
.editing .edit-hint{display:block}
.save-btn{display:none;margin-top:8px;padding:6px 14px;background:var(--v);color:#000;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.editing .save-btn{display:inline-block}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ovl.on{display:flex}
.mdl{background:var(--gd);border-radius:16px 16px 0 0;border:1px solid var(--gl);width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding-bottom:28px}
.mh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--gm)}
.mt{font-size:15px;font-weight:700}
.mx{background:none;border:none;color:var(--ts);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.ms{padding:14px 16px 0}
.ml{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.mbs{display:flex;flex-direction:column;gap:8px}
.mb{width:100%;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:left}
.mb:active{opacity:.7}
.mbv{background:rgba(46,204,64,.12);color:var(--v);border:1px solid rgba(46,204,64,.25)}
.mbn{background:rgba(255,107,26,.12);color:var(--n);border:1px solid rgba(255,107,26,.25)}
.mbg{background:transparent;color:var(--ws);border:1px solid var(--gl)}
.empty{padding:48px 20px;text-align:center;color:var(--ts)}
.empty .ico{font-size:36px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.6}
.ftr{text-align:center;padding:16px;font-size:10px;color:var(--gl)}
.ftr img{height:14px;opacity:.3;vertical-align:middle;margin-right:4px}

@media(max-width:600px){
  .tiros-hdr{grid-template-columns:32px 90px 1fr 70px}
  .tr{grid-template-columns:32px 90px 1fr 70px}
  .tiros-hdr span:nth-child(3),.tiros-hdr span:nth-child(6),.tiros-hdr span:nth-child(7){display:none}
  .tr .tmt,.tr .tdr{display:none}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <img class="logo" id="logo-img" alt="Costa Verde">
    <div class="pinfo">
      <div class="pname" id="pname">Sin proyecto cargado</div>
      <div class="pdate" id="pdate">Monitor de Rodaje &middot; Costa Verde</div>
    </div>
    <button class="btn-menu" id="btn-menu">Menu</button>
  </div>
  <div class="sbar">
    <div class="si"><div class="sv" id="st">&#8212;</div><div class="sl">Tiros</div></div>
    <div class="si"><div class="sv" id="sok" style="color:var(--v)">0</div><div class="sl">OK</div></div>
    <div class="si"><div class="sv" id="spe" style="color:var(--n)">&#8212;</div><div class="sl">Pend.</div></div>
    <div class="si"><div class="sv" id="spct">0%</div><div class="sl">Avance</div></div>
  </div>
  <div class="pb"><div class="pf" id="prog" style="width:0%"></div></div>
</div>

<div class="tabs">
  <div class="tab on" id="tab-plan">Plan de Rodaje</div>
  <div class="tab" id="tab-guion">Guion</div>
</div>

<div class="view on" id="view-plan"></div>
<div class="view" id="view-guion"></div>

<div class="ftr">
  <img id="logo-ftr" alt=""> Monitor de Rodaje &copy; Costa Verde Productions
</div>

<div class="ovl" id="ovl">
  <div class="mdl">
    <div class="mh">
      <div class="mt">Menu</div>
      <button class="mx" id="btn-x">&#x2715;</button>
    </div>
    <div class="ms">
      <div class="ml">Cargar proyecto</div>
      <div class="mbs">
        <button class="mb mbv" id="btn-lp">Cargar Plan de Rodaje (JSON)</button>
        <button class="mb mbv" id="btn-lg">Cargar Guion (JSON)</button>
      </div>
    </div>
    <div class="ms" style="margin-top:14px">
      <div class="ml">Estado del rodaje</div>
      <div class="mbs">
        <button class="mb mbn" id="btn-save">Guardar estado (JSON)</button>
        <button class="mb mbn" id="btn-le">Cargar estado (JSON)</button>
      </div>
    </div>
    <div class="ms" style="margin-top:14px">
      <div class="ml">Acciones</div>
      <div class="mbs">
        <button class="mb mbg" id="btn-reset">Resetear todos los tiros</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fp" accept=".json" style="display:none">
<input type="file" id="fg" accept=".json" style="display:none">
<input type="file" id="fe" accept=".json" style="display:none">

  // Estado: { tiros:{id:status}, edits:{id:{field:value}} }
  var ESTADO = { tiros:{}, edits:{} };
  var activePlan  = PLAN;
  var activeGuion = GUION;

  document.getElementById('logo-img').src = LOGO;
  document.getElementById('logo-ftr').src = LOGO;

  /* ---- HELPERS ---- */
  function getTiroStatus(id){ return ESTADO.tiros[id]||''; }
  function getEdit(id, field, fallback){
    return (ESTADO.edits[id] && ESTADO.edits[id][field] !== undefined)
      ? ESTADO.edits[id][field] : fallback;
  }
  function setEdit(id, field, value){
    if(!ESTADO.edits[id]) ESTADO.edits[id]={};
    ESTADO.edits[id][field]=value;
  }

  /* ---- TABS ---- */
  document.getElementById('tab-plan').addEventListener('click',function(){
    document.getElementById('tab-plan').className='tab on';
    document.getElementById('tab-guion').className='tab';
    document.getElementById('view-plan').className='view on';
    document.getElementById('view-guion').className='view';
  });
  document.getElementById('tab-guion').addEventListener('click',function(){
    document.getElementById('tab-plan').className='tab';
    document.getElementById('tab-guion').className='tab on';
    document.getElementById('view-plan').className='view';
    document.getElementById('view-guion').className='view on';
  });

  /* ---- MODAL ---- */
  function openModal(){ document.getElementById('ovl').className='ovl on'; }
  function closeModal(){ document.getElementById('ovl').className='ovl'; }
  document.getElementById('btn-menu').addEventListener('click',openModal);
  document.getElementById('btn-x').addEventListener('click',closeModal);
  document.getElementById('ovl').addEventListener('click',function(e){
    if(e.target===document.getElementById('ovl')) closeModal();
  });

  /* ---- FILE IO ---- */
  document.getElementById('btn-lp').addEventListener('click',function(){ document.getElementById('fp').click(); closeModal(); });
  document.getElementById('btn-lg').addEventListener('click',function(){ document.getElementById('fg').click(); closeModal(); });
  document.getElementById('btn-le').addEventListener('click',function(){ document.getElementById('fe').click(); closeModal(); });

  function readJSON(e,cb){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){ try{ cb(JSON.parse(ev.target.result)); } catch(err){ alert('JSON invalido: '+err.message); } };
    r.readAsText(file,'UTF-8');
    e.target.value='';
  }
  document.getElementById('fp').addEventListener('change',function(e){ readJSON(e,function(d){ activePlan=d; renderAll(); }); });
  document.getElementById('fg').addEventListener('change',function(e){ readJSON(e,function(d){ activeGuion=d; renderAll(); }); });
  document.getElementById('fe').addEventListener('change',function(e){
    readJSON(e,function(d){
      // Support both old format (flat obj) and new format ({tiros,edits})
      if(d.tiros !== undefined){ ESTADO=d; }
      else { ESTADO={tiros:d, edits:{}}; }
      renderAll();
    });
  });

  document.getElementById('btn-save').addEventListener('click',function(){
    var blob=new Blob([JSON.stringify(ESTADO,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    var d=new Date();
    a.download='estado_'+d.toISOString().slice(0,10)+'_'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0')+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    closeModal();
  });

  document.getElementById('btn-reset').addEventListener('click',function(){
    if(!confirm('Resetear todos los tiros?')) return;
    ESTADO={tiros:{},edits:{}}; renderAll(); closeModal();
  });

  /* ---- STATS ---- */
  function getAllTiros(){
    if(!activePlan) return [];
    var all=[];
    for(var i=0;i<activePlan.bloques.length;i++){
      var t=activePlan.bloques[i].tiros||[];
      for(var j=0;j<t.length;j++) all.push(t[j]);
    }
    return all;
  }
  function updateStats(){
    var all=getAllTiros();
    var total=all.length, ok=0;
    for(var k=0;k<all.length;k++){ if(getTiroStatus(all[k].id)==='ok') ok++; }
    document.getElementById('st').textContent=total||'—';
    document.getElementById('sok').textContent=ok;
    document.getElementById('spe').textContent=total?(total-ok):'—';
    document.getElementById('spct').textContent=total?Math.round(ok/total*100)+'%':'0%';
    document.getElementById('prog').style.width=total?Math.round(ok/total*100)+'%':'0%';
    if(activePlan){
      document.getElementById('pname').textContent=activePlan.proyecto||'Proyecto';
      document.getElementById('pdate').textContent=(activePlan.fecha||'')+(activePlan.call?' - Call: '+activePlan.call:'');
    }
  }

  /* ---- PLAN — EVENT DELEGATION ---- */
  document.getElementById('view-plan').addEventListener('click',function(e){
    // Tiro toggle — single click on row but NOT on edit button
    if(e.target.classList.contains('edit-btn')) return;
    var trow=e.target.closest('[data-tid]');
    if(trow){
      e.stopPropagation();
      var id=trow.getAttribute('data-tid');
      var cur=getTiroStatus(id);
      if(!cur) ESTADO.tiros[id]='ok';
      else if(cur==='ok') ESTADO.tiros[id]='skip';
      else delete ESTADO.tiros[id];
      // Update row in place
      var st=getTiroStatus(id);
      var ck=trow.querySelector('.tck');
      var ds=trow.querySelector('.tds');
      ck.className='tck'+(st==='ok'?' ok':st==='skip'?' sk':'');
      ck.innerHTML=st==='ok'?'&#10003;':st==='skip'?'&#10007;':'';
      if(ds) ds.className='tds'+(st==='ok'?' dn':'');
      updateStats();
      updateGuionPills();
      return;
    }
    // Bloque toggle
    var hdr=e.target.closest('[data-bid]');
    if(hdr){
      var bid=hdr.getAttribute('data-bid');
      var tw=document.getElementById('tw-'+bid);
      var ch=document.getElementById('ch-'+bid);
      if(tw){
        var open=tw.style.display==='block';
        tw.style.display=open?'none':'block';
        if(ch) ch.className=open?'bch':'bch op';
      }
    }
  });

  // Tiro description inline edit
  document.getElementById('view-plan').addEventListener('dblclick',function(e){
    var ds=e.target.closest('.tds');
    if(ds && ds.closest('[data-tid]')){
      ds.contentEditable='true';
      ds.focus();
      ds.addEventListener('blur',function saveTiroEdit(){
        ds.contentEditable='false';
        var id=ds.closest('[data-tid]').getAttribute('data-tid');
        setEdit(id,'desc',ds.textContent);
        ds.removeEventListener('blur',saveTiroEdit);
      },{once:true});
    }
  });

  /* ---- RENDER PLAN ---- */
  function renderPlan(){
    var el=document.getElementById('view-plan');
    if(!activePlan){
      el.innerHTML='<div class="empty"><div class="ico">&#128203;</div><p>Carga un plan desde el Menu</p></div>';
      return;
    }
    var h=[];
    for(var i=0;i<activePlan.bloques.length;i++){
      var b=activePlan.bloques[i];
      var tiros=b.tiros||[];
      var ok=0; for(var j=0;j<tiros.length;j++){ if(getTiroStatus(tiros[j].id)==='ok') ok++; }
      var color=b.tipo==='rodaje'?'#2ECC40':'#FF6B1A';
      var has=tiros.length>0;
      h.push('<div class="blq">');
      h.push('<div class="bhdr"'+(has?' data-bid="'+b.id+'"':'')+'>');
      h.push('<div class="bdot" style="background:'+color+'"></div>');
      h.push('<div class="bi"><div class="bn">'+b.nombre+'</div>');
      h.push('<div class="bm">'+b.label+' &middot; '+b.meta+'</div></div>');
      if(has){
        h.push('<div class="bct">'+ok+'/'+tiros.length+'</div>');
        h.push('<div class="bch" id="ch-'+b.id+'">&#8964;</div>');
      }
      h.push('</div>');
      if(b.nota) h.push('<div class="bnota">'+b.nota+'</div>');
      if(has){
        h.push('<div class="twrap" id="tw-'+b.id+'" style="display:none">');
        h.push('<div class="tiros-hdr"><span></span><span>Tiro</span><span>TC</span><span>Descripcion</span><span>Talento</span><span>Locacion</span><span>Dur.</span></div>');
        for(var k=0;k<tiros.length;k++){
          var t=tiros[k];
          var st=getTiroStatus(t.id);
          var desc=getEdit(t.id,'desc',t.desc);
          var num=t.id.replace(/^EP0[0-9]-/,'');
          h.push('<div class="tr" data-tid="'+t.id+'">');
          h.push('<div class="tck'+(st==='ok'?' ok':st==='skip'?' sk':'')+'">');
          h.push(st==='ok'?'&#10003;':st==='skip'?'&#10007;':'');
          h.push('</div>');
          h.push('<div class="tid"><span class="ep e'+t.ep+'">EP0'+t.ep+'</span>'+num+'</div>');
          h.push('<div class="tmt">'+t.tc+'</div>');
          h.push('<div class="tds'+(st==='ok'?' dn':'')+'" title="Doble tap para editar">'+desc+'</div>');
          h.push('<div class="tmt">'+t.personaje+'</div>');
          h.push('<div class="tmt">'+t.locacion+'</div>');
          h.push('<div class="tdr">'+t.dur+'min</div>');
          h.push('</div>');
        }
        h.push('</div>');
      }
      h.push('</div>');
    }
    el.innerHTML=h.join('');
  }

  /* ---- GUION — UPDATE PILLS ONLY ---- */
  function updateGuionPills(){
    var pills=document.querySelectorAll('#view-guion .pill[data-pid]');
    for(var i=0;i<pills.length;i++){
      var pid=pills[i].getAttribute('data-pid');
      var st=getTiroStatus(pid);
      pills[i].className='pill'+(st==='ok'?' ok':st==='skip'?' sk':'');
    }
    var esds=document.querySelectorAll('#view-guion .esd[data-tids]');
    for(var j=0;j<esds.length;j++){
      var tids=esds[j].getAttribute('data-tids').split(',').filter(function(x){return x;});
      var okC=0; for(var k=0;k<tids.length;k++){ if(getTiroStatus(tids[k])==='ok') okC++; }
      var dc=tids.length>0?(okC===tids.length?' ok':okC>0?' pt':''):'';
      esds[j].className='esd'+dc;
    }
  }

  /* ---- RENDER GUION ---- */
  function renderGuion(){
    var el=document.getElementById('view-guion');
    if(!activeGuion){
      el.innerHTML='<div class="empty"><div class="ico">&#127916;</div><p>Carga un guion desde el Menu</p></div>';
      return;
    }
    var h=[];
    for(var i=0;i<activeGuion.episodios.length;i++){
      var ep=activeGuion.episodios[i];
      h.push('<div class="epb">');
      h.push('<div class="ept">'+ep.titulo+' <span style="font-size:12px;color:#888;font-weight:400">&middot; '+ep.duracion+'</span></div>');
      h.push('<div class="eps">'+ep.sinopsis+'</div>');
      for(var j=0;j<ep.escenas.length;j++){
        var esc=ep.escenas[j];
        var tiros=esc.tiros||[];
        var okC=0; for(var k=0;k<tiros.length;k++){ if(getTiroStatus(tiros[k])==='ok') okC++; }
        var dc=tiros.length>0?(okC===tiros.length?' ok':okC>0?' pt':''):'';
        var tidsStr=tiros.join(',');
        var accion=getEdit(esc.id,'accion',esc.accion);
        var dialogo=getEdit(esc.id,'dialogo',esc.dialogo||'');
        h.push('<div class="esc">');
        h.push('<div class="esh">');
        h.push('<div class="esn">ESC '+esc.numero+'</div>');
        h.push('<div class="est">'+esc.titulo+'</div>');
        if(tiros.length>0) h.push('<div class="esd'+dc+'" data-tids="'+tidsStr+'"></div>');
        h.push('<button class="esc-edit-btn" data-esc="'+esc.id+'" title="Editar">&#9998;</button>');
        h.push('</div>');
        h.push('<div class="esb" id="esb-'+esc.id+'">');
        h.push('<div class="esa" id="esa-'+esc.id+'">'+accion+'</div>');
        if(dialogo) h.push('<div class="esdl" id="esdl-'+esc.id+'">'+dialogo+'</div>');
        h.push('<div class="edit-hint">Edita el texto directamente. Toca Guardar cuando termines.</div>');
        h.push('<button class="save-btn" data-esc="'+esc.id+'">Guardar cambios</button>');
        if(tiros.length>0){
          h.push('<div class="estp">');
          for(var m=0;m<tiros.length;m++){
            var tid=tiros[m];
            var tst=getTiroStatus(tid);
            h.push('<span class="pill'+(tst==='ok'?' ok':tst==='skip'?' sk':'')+'" data-pid="'+tid+'">'+tid+'</span>');
          }
          h.push('</div>');
        }
        h.push('</div></div>');
      }
      h.push('</div>');
    }
    el.innerHTML=h.join('');

    // Attach edit button listeners
    var editBtns=document.querySelectorAll('.esc-edit-btn');
    for(var b=0;b<editBtns.length;b++){
      editBtns[b].addEventListener('click',function(){
        var escId=this.getAttribute('data-esc');
        var esb=document.getElementById('esb-'+escId);
        var esa=document.getElementById('esa-'+escId);
        var esdl=document.getElementById('esdl-'+escId);
        var editing=esb.classList.contains('editing');
        if(editing){
          // Already editing — do nothing (save button handles it)
        } else {
          esb.classList.add('editing');
          this.classList.add('active');
          esa.contentEditable='true';
          esa.focus();
          if(esdl){ esdl.contentEditable='true'; }
        }
      });
    }

    // Save button listeners
    var saveBtns=document.querySelectorAll('.esb .save-btn');
    for(var s=0;s<saveBtns.length;s++){
      saveBtns[s].addEventListener('click',function(){
        var escId=this.getAttribute('data-esc');
        var esb=document.getElementById('esb-'+escId);
        var esa=document.getElementById('esa-'+escId);
        var esdl=document.getElementById('esdl-'+escId);
        setEdit(escId,'accion',esa.textContent);
        if(esdl){ setEdit(escId,'dialogo',esdl.textContent); }
        esa.contentEditable='false';
        if(esdl){ esdl.contentEditable='false'; }
        esb.classList.remove('editing');
        var editBtn=document.querySelector('.esc-edit-btn[data-esc="'+escId+'"]');
        if(editBtn) editBtn.classList.remove('active');
      });
    }
  }

  /* ---- RENDER ALL ---- */
  function renderAll(){
    updateStats();
    renderPlan();
    renderGuion();
  }

  renderAll();
})();
</script>
</body>
</html>
